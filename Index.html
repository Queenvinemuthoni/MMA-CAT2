<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Save Our Wildlife</h1>
        
        <div class="video-wrapper">
            <video id="wildlife-video" controls aria-label="Wildlife conservation promotional video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <p class="description">
            Our planet's wildlife is facing unprecedented threats. Watch our promotional video to learn more about our ongoing conservation efforts and discover how you can help protect endangered species and their natural habitats before it's too late.
        </p>

        <button id="action-btn" aria-live="polite">Play Video</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
